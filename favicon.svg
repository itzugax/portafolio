<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Gem shape: wide at top, narrows to point at bottom -->
  <!-- Top flat edge at y=20, widest at y=38, point at y=85 -->
  <polygon
    points="50,15 82,38 50,85 18,38"
    fill="#00e676"
  />
  <!-- Subtle inner facet for depth -->
  <polygon
    points="50,15 82,38 50,55 18,38"
    fill="#00ff88"
    opacity="0.35"
  />
</svg>
